services:
  backend:
    image: muneebrather/backend:latest
    container_name: cicd-backend
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  frontend:
    build: muneebrather/frontend:latest
    container_name: cicd-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"